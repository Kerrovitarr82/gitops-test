apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx1
  template:
    metadata:
      labels:
        app: nginx1
    spec:
      containers:
      - name: nginx
        image: nginx:this-tag-does-not-exist
        resources:
          requests:
            memory: "32Mi"
          limits:
            memory: "64Mi"
